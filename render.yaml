services:
  - type: web
    name: option-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LONGBRIDGE_APP_KEY
        sync: false
      - key: LONGBRIDGE_APP_SECRET
        sync: false
      - key: LONGBRIDGE_ACCESS_TOKEN
        sync: false
      - key: LONGBRIDGE_LANGUAGE
        value: zh-CN
